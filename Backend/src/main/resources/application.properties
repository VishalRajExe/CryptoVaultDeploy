spring.application.name=trading-plateform

server.port=${PORT:5454}

# Railway terminates TLS - trust the X-Forwarded-Proto header so Spring
# builds https:// redirect URIs (needed for Google OAuth2 callback)
server.forward-headers-strategy=NATIVE

# Example for local MySQL: jdbc:mysql://localhost:3306/crypto_trading_platform
# Override any of these with real env vars (DB_URL / DB_USERNAME / DB_PASSWORD) -
# the value after the ":" is just the fallback used if the env var isn't set.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:crypto_trading_platform}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:admin}}

# BUGFIX: was previously wired to SQL Server's driver/dialect even though the
# project (and its mysql-connector-j dependency) is meant to run on MySQL.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# NOTE: no spring.jpa.database-platform here on purpose - Hibernate 6 auto-detects
# the MySQL dialect from the JDBC URL/driver. Setting it explicitly is what produced
# the "HHH90000025: MySQLDialect does not need to be specified explicitly" warning
# in the startup log.

spring.jpa.hibernate.ddl-auto=update


spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_mail_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory

spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.debug=true
logging.level.org.springframework.mail=DEBUG
logging.level.org.eclipse.angus.mail=DEBUG

#stripe payment gatway
stripe.api.key=${STRIPE_API_KEY:your_stripe_api_key_here}

# razorpay payment gateway
razorpay.api.key=${RAZORPAY_API_KEY:your_razorpay_key_here}
razorpay.api.secret=${RAZORPAY_API_SECRET:your_razorpay_secret_here}

# coingecko api key
coingecko.api.key=${COINGECKO_API_KEY:your_coingecko_key_here}

# gemini api key
gemini.api.key=${GEMINI_API_KEY:your_gemini_key_here}

#google oauth2 (optional)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your_google_client_id_here}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your_google_client_secret_here}
# Explicitly set redirect-uri so it always uses https:// on Railway
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH2_REDIRECT_URI:https://cryptovaultdeploy-production.up.railway.app/login/oauth2/code/google}

# Frontend URL the Google OAuth2 login success handler redirects back to with the JWT
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

