<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Left candle (green / bullish) -->
  <!-- Top wick -->
  <rect x="31" y="10" width="4" height="14" rx="2" fill="#7CFC00"/>
  <!-- Body (tall bullish) -->
  <rect x="22" y="24" width="22" height="46" rx="4" fill="#7CFC00"/>
  <!-- Bottom wick -->
  <rect x="31" y="70" width="4" height="16" rx="2" fill="#7CFC00"/>

  <!-- Right candle (red / bearish) -->
  <!-- Top wick -->
  <rect x="63" y="22" width="4" height="12" rx="2" fill="#FF3B3B"/>
  <!-- Body (shorter bearish) -->
  <rect x="54" y="34" width="22" height="32" rx="4" fill="#FF3B3B"/>
  <!-- Bottom wick -->
  <rect x="63" y="66" width="4" height="22" rx="2" fill="#FF3B3B"/>
</svg>